# ─── vsftpd Configuration ────────────────────────────────────────────────────
# TechCorp Multi-Service Container

# ── Dasar ──────────────────────────────────────────────────────────────────────
listen=YES
listen_ipv6=NO
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

# ── Chroot (batasi user ke home directory) ─────────────────────────────────────
chroot_local_user=YES
allow_writeable_chroot=NO
# user_sub_token + local_root agar tiap user masuk ke /home/<user>/ftp
user_sub_token=$USER
local_root=/home/$USER/ftp

# ── Passive Mode (untuk koneksi dari luar container) ──────────────────────────
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
# Ganti dengan IP host jika diperlukan
# pasv_address=YOUR_HOST_IP

# ── Keamanan ───────────────────────────────────────────────────────────────────
ftpd_banner=Welcome to TechCorp FTP Server
hide_ids=YES
max_clients=10
max_per_ip=3

# ── Logging ────────────────────────────────────────────────────────────────────
xferlog_enable=YES
xferlog_std_format=YES
xferlog_file=/var/log/vsftpd.log
log_ftp_protocol=YES

# ── Direktori kosong untuk chroot jail ────────────────────────────────────────
secure_chroot_dir=/var/run/vsftpd/empty

# ── PAM ────────────────────────────────────────────────────────────────────────
pam_service_name=vsftpd

# ── Timeout ────────────────────────────────────────────────────────────────────
idle_session_timeout=300
data_connection_timeout=120

# ── Transfer ───────────────────────────────────────────────────────────────────
ascii_upload_enable=YES
ascii_download_enable=YES
